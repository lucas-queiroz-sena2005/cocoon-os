site_name: Engineering Knowledge Graph
site_description: High-Density Project Documentation & Planning
site_author: Gemini CLI System

use_directory_urls: false

theme:
  name: material
  icon:
    logo: material/brain
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Core Directives: 
    - Mission & Roadmap: core/index.md
  - Architecture:
    - Specs & Topology: architecture/index.md
  - Active Planning:
    - Sprints & Research: planning/index.md
  - Rejects:
    - Grave of Ideas: rejects/index.md
