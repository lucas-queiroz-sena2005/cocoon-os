site_name: Engineering Knowledge Graph
site_description: High-Density Project Documentation & Planning
site_author: Gemini CLI System

use_directory_urls: false

theme:
  name: material
  icon:
    logo: material/brain
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Welcome: index.md
  - Corporate Strategy:
    - Product Vision: corporate/product_vision.md
    - Press Release: corporate/press_release.md
  - Core Directives: 
    - Mission & Roadmap: core/index.md
    - Glossary: core/glossary.md
  - Key Engineering Constructs:
    - Overview: architecture/constructs.md
    - State Vector (S): architecture/state_vector.md
    - Drives (D): architecture/drives.md
    - Identity (I): architecture/identity.md
    - Axes (A): architecture/axes.md
    - Memory (M): architecture/memory_system.md
  - Architecture:
    - Overview: architecture/index.md
    - System Definition: architecture/system_definition.md
    - HESTIA Protocol: architecture/hestia_protocol.md
    - Identity & Drives: architecture/identity_and_drives.md
    - Mathematical Formalization: architecture/mathematical_formalization.md
  - Active Planning:
    - Sprints & Research: planning/index.md
    - Research Manifesto: planning/RESEARCH.md
  - Rejects:
    - Grave of Ideas: rejects/index.md
    - Rejection Logs: rejects/REASON.md
    - Rejected Pipeline: rejects/dual-pass_context_and_pipeline.md
